<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petri-Chor Control Room</title>

<style>
body{
background:#000;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
color:#00e5ff;
text-align:center;
}

.message{
background:#111;
border-left:4px solid cyan;
padding:15px;
margin:15px 0;
border-radius:10px;
}

.name{
color:#00e5ff;
font-weight:bold;
}

.time{
color:#888;
font-size:12px;
}
</style>
</head>

<body>

<h1>🚂 Petri-Chor Control Room</h1>

<div id="messages"></div>

<script>

const SUPABASE_URL="https://ltbhnvrniwlivhoswzhr.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0YmhudnJuaXdsaXZob3N3emhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjY1ODQsImV4cCI6MjA5OTAwMjU4NH0.zDXfUU2ogNQiV5w3qHh_RRRcw_b5egr9459aIsF3pg8";

async function loadMessages(){

const res=await fetch(
SUPABASE_URL+"/rest/v1/messages?select=*&order=created_at.desc",
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
});

const data=await res.json();

let html="";

data.forEach(msg=>{

html+=`
<div class="message">

<div class="name">${msg.name}</div>

<p>${msg.message}</p>

<div class="time">${msg.created_at}</div>

</div>
`;

});

document.getElementById("messages").innerHTML=html;

}

loadMessages();

setInterval(loadMessages,3000);

</script>

</body>
</html>
