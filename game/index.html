<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petri-Chor : Aurora Space Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hud">🛰️ Aurora Space Station</div>
    <div id="room-banner"></div>
    
    <div id="minimap">
        <canvas id="minimapCanvas" width="120" height="120"></canvas>
    </div>

    <div id="game">
        <div id="world">
            <div id="map"></div>
            <div id="player">
                <img src="walk.png" alt="Player">
            </div>
        </div>
    </div>

    <div id="joystick-container">
    <div id="joystick-base">
        <div id="joystick-thumb"></div>
    </div>
    </div>
    
    <div id="action-container" class="hidden">
    <button id="btn-action">🖐️ INTERACT</button>
</div>
    <!-- BAG BUTTON -->
<button id="bagBtn">🎒</button>

<!-- INVENTORY WINDOW -->
<div id="bagWindow">

    <div class="bagTitle">
        🎒 INVENTORY
    </div>

    <div id="bagGrid">

        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>

        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>

        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>

        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>

    </div>

    <button id="closeBag">
        Close
    </button>

</div>

    <script src="game.js"></script>
</body>
</html>
