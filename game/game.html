<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Petri-Chor : Aurora Space Station</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none;
}
body{
background:radial-gradient(circle at top,#0f172a,#020617 80%);
overflow:hidden;
font-family:Arial,sans-serif;
}
#game{
width:100vw;
height:100vh;
overflow:hidden;
position:relative;
background:#020617;
}
#world{
position:absolute;
left:0;
top:0;
will-change: transform;
}
#map{
display:grid;
grid-template-columns:repeat(70,50px);
grid-auto-rows:50px;
}

/* ---------- Tiles ---------- */
.tile{
width:50px;
height:50px;
}
.floor, .spawn{
background:linear-gradient(135deg,#1b2433,#111827);
border:1px solid #293548;
position:relative;
}
.wall{
background:linear-gradient(180deg,#4b5563,#2b3445,#161d29);
border:2px solid #00bfff;
box-shadow:inset 0 0 12px rgba(0,255,255,.25),0 0 8px rgba(0,255,255,.2);
}    
.door{
background:linear-gradient(90deg,#0ea5e9,#67e8f9,#0ea5e9);
border:2px solid white;
box-shadow:0 0 15px cyan;
transition: opacity 0.2s ease, filter 0.2s ease;
}
.door.open {
opacity: 0.25;
filter: brightness(0.5);
box-shadow: none;
}
.window{
background:linear-gradient(180deg, rgba(0,191,255,0.4), rgba(0,255,255,0.1));
border:2px solid #67e8f9;
box-shadow:inset 0 0 10px rgba(0,255,255,0.5);
}
.terminal{
background:#1e293b;
border:2px solid #10b981;
box-shadow:0 0 8px #10b981;
position:relative;
}
.terminal::after{
content:'';
position:absolute;
top:20%; left:20%; width:60%; height:30%;
background:#059669;
box-shadow: 0 0 4px #34d399;
}
.crate{
background:#78350f;
border:2px solid #d97706;
box-shadow:inset 0 0 8px #451a03;
}
.reactor{
background:radial-gradient(circle, #a855f7 20%, #4c1d95 80%);
border:2px solid #c084fc;
box-shadow:0 0 20px #a855f7, inset 0 0 10px #c084fc;
animation:pulse 1.5s infinite alternate;
}
.med-eq{
background:#eff6ff;
border:2px solid #3b82f6;
box-shadow:0 0 8px rgba(59,130,246,0.6);
}
.lab-eq{
background:#f0fdf4;
border:2px solid #22c55e;
box-shadow:0 0 8px rgba(34,197,94,0.6);
}
.deco{
background:#334155;
border:1px solid #64748b;
}

@keyframes pulse{
from{transform:scale(1);box-shadow:0 0 15px #a855f7;}
to{transform:scale(0.95);box-shadow:0 0 25px #d8b4fe, 0 0 35px #a855f7;}
}

/* ---------- Player ---------- */
#player{
position:absolute;
width:60px;
height:60px;
z-index:100;
will-change: transform, left, top;
}
#player img{
width:100%;
height:100%;
object-fit:contain;
}
.walking img{
animation:walk .15s infinite alternate;
}
@keyframes walk{
from{margin-top:0;}
to{margin-top:-5px;}
}

/* ---------- Controls ---------- */
.controls{
position:fixed;
bottom:20px;
left:20px;
text-align:center;
z-index:999;
}
.controls button{
width:65px;
height:65px;
margin:4px;
font-size:26px;
color:cyan;
background:rgba(0,255,255,.15);
border:2px solid cyan;
border-radius:18px;
box-shadow:0 0 15px cyan,inset 0 0 12px cyan;
backdrop-filter:blur(6px);
cursor: pointer;
}
.controls button:active{
transform:scale(.9);
background:rgba(0,255,255,.35);
}

/* ---------- HUD ---------- */
#hud{
position:fixed;
top:15px;
left:15px;
color:cyan;
font-size:18px;
text-shadow:0 0 10px cyan;
z-index:999;
}
</style>
</head>
<body>

<div id="hud">
🛰️ Aurora Space Station
</div>

<div id="game">
<div id="world">
<div id="map"></div>
<div id="player">
<img src="walk.png">
</div>
</div>
</div>

<div class="controls">
<button id="btn-up">⬆️</button>
<br>
<button id="btn-left">⬅️</button>
<button id="btn-down">⬇️</button>
<button id="btn-right">➡️</button>
</div>

<script>
// ============================================================================
// NAMED CONSTANTS & TILE SYSTEM CONFIGURATION
// ============================================================================
const TILE_SIZE = 50;

const FLOOR    = 0;
const WALL     = 1;
const DOOR     = 2;
const WINDOW   = 3;
const TERMINAL = 4;
const CRATE    = 5;
const REACTOR  = 6;
const MEDICAL  = 7;
const LAB      = 8;
const DECOR    = 9;
const SPAWN    = 10;

// ============================================================================
// AURORA SPACE STATION MAP DATA GENERATOR (FIXED CONNECTIVITY & 2-TILE PATHS)
// ============================================================================
const mapData = (function() {
    const WIDTH = 70;
    const HEIGHT = 65;
    const map = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(WALL));

    function fillRect(x, y, w, h, tile) {
        for (let r = y; r < y + h; r++) {
            for (let c = x; c < x + w; c++) {
                if (r >= 0 && r < HEIGHT && c >= 0 && c < WIDTH) {
                    map[r][c] = tile;
                }
            }
        }
    }

    function createRoom(x, y, w, h) {
        fillRect(x, y, w, h, WALL);
        fillRect(x + 1, y + 1, w - 2, h - 2, FLOOR);
    }

    // --- 1. BASE ROOMS & HALLWAYS CONFIGURATION ---
    createRoom(24, 24, 22, 14); // Central Hall

    // Main Corridors (All guaranteed 2-tiles wide minimum walkable floor space)
    fillRect(10, 29, 15, 4, WALL); fillRect(10, 30, 15, 2, FLOOR); // Corridor W
    fillRect(32, 14, 6, 11, WALL); fillRect(34, 14, 2, 11, FLOOR); // Corridor N
    fillRect(45, 29, 16, 4, WALL); fillRect(45, 30, 16, 2, FLOOR); // Corridor E
    fillRect(32, 37, 6, 12, WALL); fillRect(34, 37, 2, 12, FLOOR); // Corridor S

    // Room Enclosures (Internal space designed safely around objects)
    createRoom(2, 22, 12, 10);  // Bio Lab
    createRoom(12, 15, 14, 10); // Medical Bay
    createRoom(24, 5, 13, 10);  // Control Room
    createRoom(40, 7, 12, 12);  // AI Core
    createRoom(53, 10, 15, 11); // Crew Quarters
    createRoom(55, 20, 13, 11); // Cafeteria
    createRoom(47, 36, 13, 10); // Engine Room
    createRoom(54, 45, 14, 10); // Power Reactor
    createRoom(52, 54, 14, 9);  // Storage
    createRoom(38, 48, 15, 10); // Workshop
    createRoom(21, 46, 14, 11); // Observation Deck
    createRoom(4, 44, 14, 11);  // Airlock

    // --- 2. TRANSITIONAL JOINTS & EXTENSIONS (2-TILE MINIMUM CLEARANCE) ---
    // Connect Bio Lab & Airlock down the left wing cleanly (Walkable width expanded to 3 columns)
    fillRect(6, 31, 5, 14, WALL); fillRect(7, 31, 3, 14, FLOOR); 
    
    // Secure West Corridor cross-intersection with left-wing vertical hallway
    fillRect(9, 30, 3, 2, FLOOR); 

    // Connect Engine Room down to Power Reactor & Storage layout (Walkable width set to 2 columns)
    fillRect(56, 44, 4, 11, WALL); fillRect(57, 44, 2, 11, FLOOR);

    // Bridge Airlock directly across to Observation Deck corridor pathing (Walkable height set to 2 rows)
    fillRect(17, 49, 5, 4, WALL); fillRect(17, 50, 5, 2, FLOOR);

    // --- 3. DOORWAY PLACEMENT (ALIGNING OPEN WALKABLE ENTRIES) ---
    // Core Hub Connections
    map[30][24] = DOOR; // Central Hall -> West Corridor
    map[24][34] = DOOR; map[24][35] = DOOR; // Central Hall -> North Corridor
    map[30][45] = DOOR; // Central Hall -> East Corridor
    map[37][34] = DOOR; map[37][35] = DOOR; // Central Hall -> South Corridor

    // Room Entrance Initializations
    map[27][13] = DOOR; // Bio Lab Entrance
    map[21][17] = DOOR; // Medical Bay Entrance
    map[14][28] = DOOR; // Control Room Entrance
    map[14][40] = DOOR; // AI Core Entrance
    map[16][53] = DOOR; // Crew Quarters Entrance
    map[26][55] = DOOR; // Cafeteria Entrance
    map[39][47] = DOOR; // Engine Room Entrance
    map[48][56] = DOOR; // Power Reactor Entrance
    map[54][57] = DOOR; // Storage Entrance
    map[51][42] = DOOR; // Workshop Entrance
    map[46][26] = DOOR; // Observation Deck Entrance
    map[48][17] = DOOR; // Airlock Primary Entrance

    // --- 4. DECORATIONS & SPECIFIC ENTITIES ---
    // Placed strictly along wall limits to preserve the minimum 2-tile walkable path requirement
    fillRect(4, 23, 4, 1, LAB); fillRect(9, 23, 3, 1, LAB);
    map[3][28] = DECOR; map[4][28] = DECOR;
    map[14][17] = MEDICAL; map[14][20] = MEDICAL; map[14][23] = MEDICAL;
    map[15][17] = DECOR; map[15][20] = DECOR; map[15][23] = DECOR;
    fillRect(25, 6, 10, 1, TERMINAL); map[28][7] = TERMINAL; map[32][7] = TERMINAL;
    fillRect(45, 12, 2, 2, REACTOR);
    map[41][8] = TERMINAL; map[50][8] = TERMINAL; map[41][15] = TERMINAL; map[50][15] = TERMINAL;
    for(let i = 55; i < 66; i += 3) { map[11][i] = DECOR; map[19][i] = CRATE; }
    fillRect(56, 21, 4, 1, DECOR); fillRect(56, 29, 4, 1, DECOR);
    fillRect(48, 37, 5, 1, DECOR); map[48][44] = TERMINAL;
    fillRect(59, 46, 4, 4, REACTOR);
    fillRect(53, 55, 3, 1, CRATE); fillRect(61, 55, 4, 1, CRATE);
    fillRect(53, 61, 2, 1, CRATE); fillRect(63, 61, 3, 1, CRATE);
    fillRect(39, 49, 4, 1, DECOR); map[45][49] = CRATE; map[46][49] = CRATE;
    fillRect(22, 55, 12, 1, WINDOW); map[27][54] = DECOR;
    map[49][4] = DOOR; map[50][4] = DOOR; fillRect(5, 45, 3, 1, DECOR); // Outer Docking Gate

    // Dedicated Spawn Tile (Placed inside the Central Hall safely)
    map[30][35] = SPAWN;

    return map;
})();

// ============================================================================
// DOM MAP RENDERING & TRACKING
// ============================================================================
const mapContainer = document.getElementById("map");
const doorElements = {}; // Tracks DOM elements of doors by their row-col hash

mapData.forEach((row, rInd) => {
    row.forEach((cell, cInd) => {
        let tile = document.createElement("div");
        tile.className = "tile";

        switch(cell) {
            case WALL:     tile.classList.add("wall"); break;
            case DOOR:     tile.classList.add("door"); doorElements[`${rInd}_${cInd}`] = tile; break;
            case WINDOW:   tile.classList.add("window"); break;
            case TERMINAL: tile.classList.add("terminal"); break;
            case CRATE:    tile.classList.add("crate"); break;
            case REACTOR:  tile.classList.add("reactor"); break;
            case MEDICAL:  tile.classList.add("med-eq"); break;
            case LAB:      tile.classList.add("lab-eq"); break;
            case DECOR:    tile.classList.add("deco"); break;
            case SPAWN:    tile.classList.add("spawn"); break;
            default:       tile.classList.add("floor"); break;
        }
        mapContainer.appendChild(tile);
    });
});

// ============================================================================
// GAME STATES & PARAMETERS
// ============================================================================
let playerX = 0;
let playerY = 0;
let camX = 0;
let camY = 0;

const MOVE_SPEED = 220; 
const CAMERA_LERP = 0.1; 

const inputDir = { x: 0, y: 0 };
let isWalking = false;

const player = document.getElementById("player");
const world = document.getElementById("world");
const game = document.getElementById("game");

// Dedicated Spawn Search Engine
(function locateSpawn() {
    let fallbackX = -1, fallbackY = -1;
    for (let r = 0; r < mapData.length; r++) {
        for (let c = 0; c < mapData[r].length; c++) {
            if (mapData[r][c] === SPAWN) {
                playerX = c * TILE_SIZE - 5; 
                playerY = r * TILE_SIZE - 5;
                return;
            }
            if (mapData[r][c] === FLOOR && fallbackX === -1) {
                fallbackX = c * TILE_SIZE - 5;
                fallbackY = r * TILE_SIZE - 5;
            }
        }
    }
    playerX = fallbackX;
    playerY = fallbackY;
})();

// Instant Initial Camera Setup
camX = game.clientWidth / 2 - playerX - 30;
camY = game.clientHeight / 2 - playerY - 30;
world.style.transform = `translate(${camX}px, ${camY}px)`;

// ============================================================================
// SYSTEM ENGINE LOGIC (COLLISION & AUTOMATIC DOORS)
// ============================================================================
function checkWalkable(x, y) {
    const padding = 12;
    const points = [
        { x: x + padding, y: y + padding },
        { x: x + 60 - padding, y: y + padding },
        { x: x + padding, y: y + 60 - padding },
        { x: x + 60 - padding, y: y + 60 - padding }
    ];

    for (let p of points) {
        const col = Math.floor(p.x / TILE_SIZE);
        const row = Math.floor(p.y / TILE_SIZE);

        if (!mapData[row] || mapData[row][col] === undefined) return false;
        const tile = mapData[row][col];

        // Only FLOOR, DOOR, and SPAWN allow passage
        if (tile !== FLOOR && tile !== DOOR && tile !== SPAWN) {
            return false;
        }
    }
    return true;
}

function updateDoors() {
    const pCenterX = playerX + 30;
    const pCenterY = playerY + 30;

    for (let key in doorElements) {
        const [r, c] = key.split("_").map(Number);
        const doorCenterX = c * TILE_SIZE + 25;
        const doorCenterY = r * TILE_SIZE + 25;

        const dist = Math.hypot(pCenterX - doorCenterX, pCenterY - doorCenterY);
        if (dist < TILE_SIZE * 1.5) {
            doorElements[key].classList.add("open");
        } else {
            doorElements[key].classList.remove("open");
        }
    }
}

// ============================================================================
// INPUT CONTROLLERS (MOUSE + MOBILE TOUCH EVENT WRAPPERS)
// ============================================================================
const activeButtons = new Set();

function evaluateMovementVector() {
    inputDir.x = 0;
    inputDir.y = 0;

    if (activeButtons.has("up"))    inputDir.y = -1;
    if (activeButtons.has("down"))  inputDir.y = 1;
    if (activeButtons.has("left"))  inputDir.x = -1;
    if (activeButtons.has("right")) inputDir.x = 1;

    if (inputDir.x !== 0 || inputDir.y !== 0) {
        isWalking = true;
        player.classList.add("walking");
        if (inputDir.x < 0) player.style.transform = "scaleX(-1)";
        if (inputDir.x > 0) player.style.transform = "scaleX(1)";
    } else {
        isWalking = false;
        player.classList.remove("walking");
    }
}

function bindHoldControl(btnId, direction) {
    const btn = document.getElementById(btnId);
    
    const startAction = (e) => {
        e.preventDefault();
        activeButtons.add(direction);
        evaluateMovementVector();
    };

    const stopAction = (e) => {
        activeButtons.delete(direction);
        evaluateMovementVector();
    };

    btn.addEventListener("mousedown", startAction);
    btn.addEventListener("touchstart", startAction, { passive: false });
    btn.addEventListener("mouseup", stopAction);
    btn.addEventListener("mouseleave", stopAction);
    btn.addEventListener("touchend", stopAction);
}

bindHoldControl("btn-up", "up");
bindHoldControl("btn-down", "down");
bindHoldControl("btn-left", "left");
bindHoldControl("btn-right", "right");

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") activeButtons.add("up");
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") activeButtons.add("down");
    if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") activeButtons.add("left");
    if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") activeButtons.add("right");
    evaluateMovementVector();
});

window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") activeButtons.delete("up");
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") activeButtons.delete("down");
    if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") activeButtons.delete("left");
    if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") activeButtons.delete("right");
    evaluateMovementVector();
});

// ============================================================================
// MAIN GAME LOOP (TICK DISPATCHER)
// ============================================================================
let lastTime = performance.now();

function gameLoop(currentTime) {
    let dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    if (dt > 0.1) dt = 0.1; 

    if (isWalking) {
        let nextX = playerX + inputDir.x * MOVE_SPEED * dt;
        let nextY = playerY + inputDir.y * MOVE_SPEED * dt;

        if (checkWalkable(nextX, playerY)) {
            playerX = nextX;
        }
        if (checkWalkable(playerX, nextY)) {
            playerY = nextY;
        }

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";
        
        updateDoors();
    }

    // Smooth Lerp Camera Follow System
    let targetCamX = game.clientWidth / 2 - playerX - 30;
    let targetCamY = game.clientHeight / 2 - playerY - 30;

    camX += (targetCamX - camX) * CAMERA_LERP;
    camY += (targetCamY - camY) * CAMERA_LERP;

    world.style.transform = `translate(${camX}px, ${camY}px)`;

    requestAnimationFrame(gameLoop);
}

// Start processing frame tickers
requestAnimationFrame(gameLoop);

window.addEventListener("resize", () => {
    camX = game.clientWidth / 2 - playerX - 30;
    camY = game.clientHeight / 2 - playerY - 30;
});
</script>
</body>
</html>
