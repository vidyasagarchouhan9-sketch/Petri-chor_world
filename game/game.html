<!DOCTYPE html>
<html>

<head>

<title>Petri-Chor: Aurora Space Station</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
    margin:0;
    overflow:hidden;
    background:#020617;
    touch-action:none;
}


#game{

    width:100vw;
    height:100vh;

    overflow:hidden;

    position:relative;

}



#world{

    position:absolute;

    left:0;
    top:0;

}



#map{

    display:grid;

    grid-template-columns:repeat(30,50px);

}



/* TILE */

.tile{

    width:50px;
    height:50px;

}



/* Normal wall */

.wall{

    background:#05070d;

    border:1px solid #008cff;

}



/* Security wall */

.security{

    background:#000;

    border:2px solid #00ffff;

    box-shadow:
    0 0 15px #00ffff;

}



/* Floor */

.floor{

    background:#000;

}



/* Door */

.door{

    background:#005b7a;

    border:2px solid white;

    box-shadow:
    0 0 15px #00ffff;

}



/* PLAYER */

#player{

    width:60px;
    height:60px;

    position:absolute;

    z-index:5;

}


#player img{

    width:60px;
    height:60px;

    object-fit:contain;

}



/* Walking */

.walking img{

    animation:walk .15s infinite alternate;

}


@keyframes walk{

from{
    margin-top:0;
}

to{
    margin-top:-5px;
}

}



/* Controls */

.controls{

    position:fixed;

    bottom:20px;

    left:20px;

    text-align:center;

}


button{

    width:65px;
    height:65px;

    margin:4px;

    border-radius:18px;

    border:2px solid #00ffff;

    background:rgba(0,255,255,0.15);

    color:#00ffff;

    font-size:25px;

    box-shadow:
    0 0 15px #00ffff;

}


button:active{

    transform:scale(.9);

}


</style>

</head>



<body>


<div id="game">

<div id="world">


<div id="map"></div>


<div id="player">

<img src="images/petri-chor-player.png">

</div>


</div>

</div>




<div class="controls">


<button onclick="move(0,-50)">⬆️</button>

<br>

<button onclick="move(-50,0)">⬅️</button>

<button onclick="move(0,50)">⬇️</button>

<button onclick="move(50,0)">➡️</button>


</div>





<script>


const mapData=[

"111111111111111111111111111111",

"100000000020000000000000000001",

"100011111110001111111000000001",

"100010000000001000001000000001",

"100010003000001000001000000001",

"100012000000001000001000000001",

"111110000000001000001000000001",

"100000000000002000001000000001",

"100000003000001000001000000001",

"100011111200001000001111100001",

"100010000000001000000000100001",

"100010000000002000000000100001",

"100010000111111111000000100001",

"100010000000000000000000100001",

"100012000000000000000000200001",

"111111111111111111111111111111"

];



let map=document.getElementById("map");



mapData.forEach(row=>{

row.split("").forEach(cell=>{


let tile=document.createElement("div");

tile.className="tile";


if(cell==="1")
tile.classList.add("wall");

else if(cell==="2")
tile.classList.add("door");

else if(cell==="3")
tile.classList.add("security");

else
tile.classList.add("floor");


map.appendChild(tile);


});


});




// PLAYER MOVEMENT


let x=150;

let y=150;


let player=document.getElementById("player");



player.style.left=x+"px";
player.style.top=y+"px";

// Player position

let x=150;
let y=150;

let tileSize=50;

let player=document.getElementById("player");

player.style.left=x+"px";
player.style.top=y+"px";


// Check collision

function canMove(newX,newY){


    // Player center position

    let centerX=newX+30;
    let centerY=newY+30;


    // Find tile

    let col=Math.floor(centerX/tileSize);
    let row=Math.floor(centerY/tileSize);


    // Outside map

    if(!mapData[row] || !mapData[row][col]){
        return false;
    }


    let tile=mapData[row][col];


    // Walls blocked

    if(tile==="1" || tile==="3"){

        return false;

    }


    // Door and floor allowed

    return true;

}




function move(dx,dy){


let newX=x+dx;
let newY=y+dy;



if(canMove(newX,newY)){


    x=newX;
    y=newY;


    player.style.left=x+"px";
    player.style.top=y+"px";


}



// Face direction

if(dx<0){

player.style.transform="scaleX(-1)";

}


if(dx>0){

player.style.transform="scaleX(1)";

}



// walking effect

player.classList.add("walking");


setTimeout(()=>{

player.classList.remove("walking");

},150);


    }




</script>


</body>

</html>
