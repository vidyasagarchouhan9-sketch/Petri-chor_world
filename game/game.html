<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Petri-Chor : Aurora Space Station</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none;
}

body{

background:
radial-gradient(circle at top,#0f172a,#020617 80%);
overflow:hidden;
font-family:Arial,sans-serif;
}

#game{
width:100vw;
height:100vh;
overflow:hidden;
position:relative;
background:#020617;
}

#world{
position:absolute;
left:0;
top:0;
}

#map{
display:grid;
grid-template-columns:repeat(30,50px);
grid-auto-rows:50px;
}

/* ---------- Tiles ---------- */

.tile{
width:50px;
height:50px;
}

.floor{

background:
linear-gradient(135deg,#1b2433,#111827);

border:1px solid #293548;

position:relative;

}

.wall{

background:
linear-gradient(
180deg,
#4b5563,
#2b3445,
#161d29
);

border:2px solid #00bfff;

box-shadow:
inset 0 0 12px rgba(0,255,255,.25),
0 0 8px rgba(0,255,255,.2);

}    


.security{

background:#000;

border:2px solid cyan;

animation:energy .8s infinite alternate;

}

@keyframes energy{

from{

box-shadow:
0 0 8px cyan;

}

to{

box-shadow:
0 0 22px cyan,
0 0 40px #00ffff;

}

}

.door{

background:
linear-gradient(
90deg,
#0ea5e9,
#67e8f9,
#0ea5e9
);

border:2px solid white;

box-shadow:
0 0 15px cyan;

transition:.2s;

}

.door:hover{

filter:brightness(1.4);

}

/* ---------- Player ---------- */

#player{
position:absolute;
width:60px;
height:60px;
z-index:100;
transition:left .08s linear, top .08s linear;
}

#player img{
width:100%;
height:100%;
object-fit:contain;
}

.walking img{
animation:walk .15s infinite alternate;
}

@keyframes walk{

from{
margin-top:0;
}

to{
margin-top:-5px;
}

}

/* ---------- Controls ---------- */

.controls{
position:fixed;
bottom:20px;
left:20px;
text-align:center;
z-index:999;
}

.controls button{

width:65px;
height:65px;

margin:4px;

font-size:26px;

color:cyan;

background:rgba(0,255,255,.15);

border:2px solid cyan;

border-radius:18px;

box-shadow:
0 0 15px cyan,
inset 0 0 12px cyan;

backdrop-filter:blur(6px);

}

.controls button:active{

transform:scale(.9);

background:rgba(0,255,255,.35);

}

/* ---------- HUD ---------- */

#hud{

position:fixed;

top:15px;
left:15px;

color:cyan;

font-size:18px;

text-shadow:0 0 10px cyan;

z-index:999;

}

</style>

</head>

<body>

<div id="hud">
🛰️ Aurora Space Station
</div>

<div id="game">

<div id="world">

<div id="map"></div>

<div id="player">

<img src="walk.png">

</div>

</div>

</div>

<div class="controls">

<button onclick="move(0,-50)">⬆️</button>

<br>

<button onclick="move(-50,0)">⬅️</button>

<button onclick="move(0,50)">⬇️</button>

<button onclick="move(50,0)">➡️</button>

</div>
<script>

// ===============================
// AURORA SPACE STATION MAP
// 0 = Floor
// 1 = Wall
// 2 = Door
// 3 = Security Wall
// ===============================

const mapData=[

"111111111111111111111111111111",
"100000000020000000000000000001",
"100011111110001111111000000001",
"100010000000001000001000000001",
"100010003000001000001000000001",
"100012000000001000001000000001",
"111110000000001000001000000001",
"100000000000002000001000000001",
"100000003000001000001000000001",
"100011111200001000001111100001",
"100010000000001000000000100001",
"100010000000002000000000100001",
"100010000111111111000000100001",
"100010000000000000000000100001",
"100012000000000000000000200001",
"100000000000111111111100000001",
"100000000000100000000100000001",
"100000200000100330000100020001",
"100000000000100000000100000001",
"111111111111100000000111111111",
"100000000000000000000000000001",
"100001111111111111111111000001",
"100000000000000020000000000001",
"100000333000000000000333000001",
"100000000000000000000000000001",
"100000000000111111110000000001",
"100020000000100000010000020001",
"100000000000100000010000000001",
"100000000000000000000000000001",
"111111111111111111111111111111"

];

const map=document.getElementById("map");

mapData.forEach(row=>{

    row.split("").forEach(cell=>{

        let tile=document.createElement("div");

        tile.className="tile";

        if(cell==="1"){

            tile.classList.add("wall");

        }

        else if(cell==="2"){

            tile.classList.add("door");

        }

        else if(cell==="3"){

            tile.classList.add("security");

        }

        else{

            tile.classList.add("floor");

        }

        map.appendChild(tile);

    });

});

// ===============================
// PLAYER SETUP
// ===============================

let x=100;
let y=100;

const tileSize=50;

const player=document.getElementById("player");

player.style.left=x+"px";
player.style.top=y+"px";
    // ===============================
// COLLISION
// ===============================

function canMove(newX,newY){

    const centerX=newX+30;
    const centerY=newY+30;

    const col=Math.floor(centerX/tileSize);
    const row=Math.floor(centerY/tileSize);

    if(!mapData[row]) return false;
    if(!mapData[row][col]) return false;

    const tile=mapData[row][col];

    // Walls & security walls block movement
    if(tile==="1" || tile==="3"){
        return false;
    }

    // Floor and doors are walkable
    return true;
}



// ===============================
// CAMERA
// ===============================

const world=document.getElementById("world");
const game=document.getElementById("game");

function updateCamera(){

    let camX=game.clientWidth/2-x-30;
    let camY=game.clientHeight/2-y-30;

    world.style.left=camX+"px";
    world.style.top=camY+"px";

}



// ===============================
// PLAYER MOVEMENT
// ===============================

function move(dx,dy){

    const newX=x+dx;
    const newY=y+dy;

    if(canMove(newX,newY)){

        x=newX;
        y=newY;

        player.style.left=x+"px";
        player.style.top=y+"px";

        updateCamera();

    }

    // Face left/right

    if(dx<0){
        player.style.transform="scaleX(-1)";
    }

    if(dx>0){
        player.style.transform="scaleX(1)";
    }

    // Walking animation

    player.classList.add("walking");

    setTimeout(()=>{

        player.classList.remove("walking");

    },150);

}



// ===============================
// START CAMERA
// ===============================

updateCamera();

</script>

</body>

</html>
