<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Petri-Chor : Aurora Space Station</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none;
}
body{
background:radial-gradient(circle at top,#0f172a,#020617 80%);
overflow:hidden;
font-family:Arial,sans-serif;
}
#game{
width:100vw;
height:100vh;
overflow:hidden;
position:relative;
background:#020617;
}
#world{
position:absolute;
left:0;
top:0;
will-change: transform;
}
#map{
display:grid;
grid-template-columns:repeat(80,50px);
grid-auto-rows:50px;
}

/* ---------- Tiles ---------- */
.tile{
width:50px;
height:50px;
}
.floor, .spawn{
background:linear-gradient(135deg,#1b2433,#111827);
border:1px solid #293548;
position:relative;
}
.wall{
background:linear-gradient(180deg,#4b5563,#2b3445,#161d29);
border:2px solid #00bfff;
box-shadow:inset 0 0 12px rgba(0,255,255,.25),0 0 8px rgba(0,255,255,.2);
}    
.door{
background:linear-gradient(90deg,#0ea5e9,#67e8f9,#0ea5e9);
border:2px solid white;
box-shadow:0 0 15px cyan;
transition: opacity 0.2s ease, filter 0.2s ease;
}
.door.open {
opacity: 0.25;
filter: brightness(0.5);
box-shadow: none;
}
.window{
background:linear-gradient(180deg, rgba(0,191,255,0.4), rgba(0,255,255,0.1));
border:2px solid #67e8f9;
box-shadow:inset 0 0 10px rgba(0,255,255,0.5);
}
.terminal{
background:#1e293b;
border:2px solid #10b981;
box-shadow:0 0 8px #10b981;
position:relative;
}
.terminal::after{
content:'';
position:absolute;
top:20%; left:20%; width:60%; height:30%;
background:#059669;
box-shadow: 0 0 4px #34d399;
}
.crate{
background:#78350f;
border:2px solid #d97706;
box-shadow:inset 0 0 8px #451a03;
}
.reactor{
background:radial-gradient(circle, #a855f7 20%, #4c1d95 80%);
border:2px solid #c084fc;
box-shadow:0 0 20px #a855f7, inset 0 0 10px #c084fc;
animation:pulse 1.5s infinite alternate;
}
.med-eq{
background:#eff6ff;
border:2px solid #3b82f6;
box-shadow:0 0 8px rgba(59,130,246,0.6);
}
.lab-eq{
background:#f0fdf4;
border:2px solid #22c55e;
box-shadow:0 0 8px rgba(34,197,94,0.6);
}
.deco{
background:#334155;
border:1px solid #64748b;
}

@keyframes pulse{
from{transform:scale(1);box-shadow:0 0 15px #a855f7;}
to{transform:scale(0.95);box-shadow:0 0 25px #d8b4fe, 0 0 35px #a855f7;}
}

/* ---------- Player ---------- */
#player{
position:absolute;
width:60px;
height:60px;
z-index:100;
will-change: transform, left, top;
}
#player img{
width:100%;
height:100%;
object-fit:contain;
}
.walking img{
animation:walk .15s infinite alternate;
}
@keyframes walk{
from{margin-top:0;}
to{margin-top:-5px;}
}

/* ---------- Controls ---------- */
.controls{
position:fixed;
bottom:20px;
left:20px;
text-align:center;
z-index:999;
}
.controls button{
width:65px;
height:65px;
margin:4px;
font-size:26px;
color:cyan;
background:rgba(0,255,255,.15);
border:2px solid cyan;
border-radius:18px;
box-shadow:0 0 15px cyan,inset 0 0 12px cyan;
backdrop-filter:blur(6px);
cursor: pointer;
}
.controls button:active{
transform:scale(.9);
background:rgba(0,255,255,.35);
}

/* ---------- HUD ---------- */
#hud{
position:fixed;
top:15px;
left:15px;
color:cyan;
font-size:18px;
text-shadow:0 0 10px cyan;
z-index:999;
}

/* ---------- Room Name Banner ---------- */
#room-banner{
position:fixed;
top:70px;
left:50%;
transform:translate(-50%,-12px);
z-index:998;
padding:10px 28px;
color:#e0fbff;
font-size:22px;
font-weight:bold;
letter-spacing:1px;
background:rgba(6,20,32,.55);
border:1px solid rgba(0,255,255,.5);
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,255,.35), inset 0 0 12px rgba(0,255,255,.15);
text-shadow:0 0 8px cyan;
opacity:0;
pointer-events:none;
transition:opacity .5s ease, transform .5s ease;
white-space:nowrap;
}
#room-banner.show{
opacity:1;
transform:translate(-50%,0);
}
  #minimap{
    position:fixed;
    top:15px;
    right:15px;
    width:120px;
    height:120px;
    background:rgba(0,0,0,.6);
    border:2px solid cyan;
    border-radius:10px;
    overflow:hidden;
    z-index:9999;
}

#minimapCanvas{
    width:100%;
    height:100%;
    display:block;
}
</style>
</head>
<body>

<div id="hud">
🛰️ Aurora Space Station
</div>

<div id="room-banner"></div>
  <div id="minimap">
    <canvas id="minimapCanvas" width="120" height="120"></canvas>
  </div>

<div id="game">
<div id="world">
<div id="map"></div>
<div id="player">
<img src="walk.png">
</div>
</div>
</div>

<div class="controls">
<button id="btn-up">⬆️</button>
<br>
<button id="btn-left">⬅️</button>
<button id="btn-down">⬇️</button>
<button id="btn-right">➡️</button>
</div>

function getRoomNameAt(px, py) {
    const col = Math.floor((px + 30) / TILE_SIZE);
    const row = Math.floor((py + 30) / TILE_SIZE);
    for (const zone of ROOM_ZONES) {
        if (row > zone.r1 && row < zone.r2 && col > zone.c1 && col < zone.c2) {
            return zone.name;
        }
    }
    return null;
}

// ============================================================================
// DOM MAP RENDERING & TRACKING
// ============================================================================
const mapContainer = document.getElementById("map");
const doorElements = {}; // Tracks DOM elements of doors by their row-col hash

mapData.forEach((row, rInd) => {
    row.forEach((cell, cInd) => {
        let tile = document.createElement("div");
        tile.className = "tile";

        switch(cell) {
            case WALL:     tile.classList.add("wall"); break;
            case DOOR:     tile.classList.add("door"); doorElements[`${rInd}_${cInd}`] = tile; break;
            case WINDOW:   tile.classList.add("window"); break;
            case TERMINAL: tile.classList.add("terminal"); break;
            case CRATE:    tile.classList.add("crate"); break;
            case REACTOR:  tile.classList.add("reactor"); break;
            case MEDICAL:  tile.classList.add("med-eq"); break;
            case LAB:      tile.classList.add("lab-eq"); break;
            case DECOR:    tile.classList.add("deco"); break;
            case SPAWN:    tile.classList.add("spawn"); break;
            default:       tile.classList.add("floor"); break;
        }
        mapContainer.appendChild(tile);
    });
});

    clearTimeout(bannerHideTimer);
    bannerHideTimer = setTimeout(() => {
        roomBanner.classList.remove("show");
    }, 2800);
}

function checkRoomEntry() {
    const roomName = getRoomNameAt(playerX, playerY);
    if (roomName && roomName !== currentRoomName) {
        currentRoomName = roomName;
        showRoomBanner(roomName);
    } else if (!roomName) {
        // Player is in a corridor/spine between rooms - reset so walking
        // back into the same room later shows the banner again.
        currentRoomName = null;
    }
}

// Dedicated Spawn Search Engine
(function locateSpawn() {
    let fallbackX = -1, fallbackY = -1;
    for (let r = 0; r < mapData.length; r++) {
        for (let c = 0; c < mapData[r].length; c++) {
            if (mapData[r][c] === SPAWN) {
                playerX = c * TILE_SIZE - 5; 
                playerY = r * TILE_SIZE - 5;
                return;
            }
            if (mapData[r][c] === FLOOR && fallbackX === -1) {
                fallbackX = c * TILE_SIZE - 5;
                fallbackY = r * TILE_SIZE - 5;
            }
        }
    }
    playerX = fallbackX;
    playerY = fallbackY;
})();

// Instant Initial Camera Setup
camX = game.clientWidth / 2 - playerX - 30;
camY = game.clientHeight / 2 - playerY - 30;
world.style.transform = `translate(${camX}px, ${camY}px)`;

// Announce the starting room right away
checkRoomEntry();

// ============================================================================
// SYSTEM ENGINE LOGIC (COLLISION & AUTOMATIC DOORS)
// ============================================================================
function checkWalkable(x, y) {
    const padding = 12;
    const points = [
        { x: x + padding, y: y + padding },
        { x: x + 60 - padding, y: y + padding },
        { x: x + padding, y: y + 60 - padding },
        { x: x + 60 - padding, y: y + 60 - padding }
    ];

    for (let p of points) {
        const col = Math.floor(p.x / TILE_SIZE);
        const row = Math.floor(p.y / TILE_SIZE);

        if (!mapData[row] || mapData[row][col] === undefined) return false;
        const tile = mapData[row][col];

        // Only FLOOR, DOOR, and SPAWN allow passage
        if (tile !== FLOOR && tile !== DOOR && tile !== SPAWN) {
            return false;
        }
    }
    return true;
}

function updateDoors() {
    const pCenterX = playerX + 30;
    const pCenterY = playerY + 30;

    for (let key in doorElements) {
        const [r, c] = key.split("_").map(Number);
        const doorCenterX = c * TILE_SIZE + 25;
        const doorCenterY = r * TILE_SIZE + 25;

        const dist = Math.hypot(pCenterX - doorCenterX, pCenterY - doorCenterY);
        if (dist < TILE_SIZE * 1.5) {
            doorElements[key].classList.add("open");
        } else {
            doorElements[key].classList.remove("open");
        }
    }
}

// ============================================================================
// INPUT CONTROLLERS (MOUSE + MOBILE TOUCH EVENT WRAPPERS)
// ============================================================================
const activeButtons = new Set();

function evaluateMovementVector() {
    inputDir.x = 0;
    inputDir.y = 0;

    if (activeButtons.has("up"))    inputDir.y = -1;
    if (activeButtons.has("down"))  inputDir.y = 1;
    if (activeButtons.has("left"))  inputDir.x = -1;
    if (activeButtons.has("right")) inputDir.x = 1;

    if (inputDir.x !== 0 || inputDir.y !== 0) {
        isWalking = true;
        player.classList.add("walking");
        if (inputDir.x < 0) player.style.transform = "scaleX(-1)";
        if (inputDir.x > 0) player.style.transform = "scaleX(1)";
    } else {
        isWalking = false;
        player.classList.remove("walking");
    }
}

function bindHoldControl(btnId, direction) {
    const btn = document.getElementById(btnId);
    
    const startAction = (e) => {
        e.preventDefault();
        activeButtons.add(direction);
        evaluateMovementVector();
    };

    const stopAction = (e) => {
        activeButtons.delete(direction);
        evaluateMovementVector();
    };

    btn.addEventListener("mousedown", startAction);
    btn.addEventListener("touchstart", startAction, { passive: false });
    btn.addEventListener("mouseup", stopAction);
    btn.addEventListener("mouseleave", stopAction);
    btn.addEventListener("touchend", stopAction);
}

bindHoldControl("btn-up", "up");
bindHoldControl("btn-down", "down");
bindHoldControl("btn-left", "left");
bindHoldControl("btn-right", "right");

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") activeButtons.add("up");
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") activeButtons.add("down");
    if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") activeButtons.add("left");
    if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") activeButtons.add("right");
    evaluateMovementVector();
});

window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") activeButtons.delete("up");
    if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") activeButtons.delete("down");
    if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") activeButtons.delete("left");
    if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") activeButtons.delete("right");
    evaluateMovementVector();
});

// ============================================================================
// MAIN GAME LOOP (TICK DISPATCHER)
// ============================================================================
let lastTime = performance.now();

function gameLoop(currentTime) {
    let dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    if (dt > 0.1) dt = 0.1; 

    if (isWalking) {
        let nextX = playerX + inputDir.x * MOVE_SPEED * dt;
        let nextY = playerY + inputDir.y * MOVE_SPEED * dt;

        if (checkWalkable(nextX, playerY)) {
            playerX = nextX;
        }
        if (checkWalkable(playerX, nextY)) {
            playerY = nextY;
        }

        player.style.left = playerX + "px";
        player.style.top = playerY + "px";
        
        updateDoors();
        checkRoomEntry();
      const minimapCanvas = document.getElementById("minimapCanvas");
const miniCtx = minimapCanvas.getContext("2d");

function updateMiniMap(){

    miniCtx.clearRect(0,0,120,120);

    const scale = 0.12;

    for(let y=0;y<map.length;y++){

        for(let x=0;x<map[y].length;x++){

            if(map[y][x]==1){

                miniCtx.fillStyle="#00ffff";

            }else{

                miniCtx.fillStyle="#333";

            }

            miniCtx.fillRect(
                x*scale,
                y*scale,
                scale,
                scale
            );
        }
    }

    miniCtx.fillStyle="red";

    miniCtx.beginPath();

    miniCtx.arc(
        player.x*scale,
        player.y*scale,
        3,
        0,
        Math.PI*2
    );

    miniCtx.fill();
}
    }

    // Smooth Lerp Camera Follow System
    let targetCamX = game.clientWidth / 2 - playerX - 30;
    let targetCamY = game.clientHeight / 2 - playerY - 30;

    camX += (targetCamX - camX) * CAMERA_LERP;
    camY += (targetCamY - camY) * CAMERA_LERP;

    world.style.transform = `translate(${camX}px, ${camY}px)`;
  updateMiniMap();

    requestAnimationFrame(gameLoop);
}

// Start processing frame tickers
requestAnimationFrame(gameLoop);

window.addEventListener("resize", () => {
    camX = game.clientWidth / 2 - playerX - 30;
    camY = game.clientHeight / 2 - playerY - 30;
});
</script>
